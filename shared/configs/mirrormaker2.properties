# MirrorMaker 2 Configuration
clusters = source, target

# Source cluster (OnPrem Kafka on EC2)
source.bootstrap.servers = ${SOURCE_BOOTSTRAP_SERVERS}

# Target cluster (US-W-CENTER MSK with IAM auth)
target.bootstrap.servers = ${TARGET_BOOTSTRAP_SERVERS}
target.security.protocol = SASL_SSL
target.sasl.mechanism = AWS_MSK_IAM
target.sasl.jaas.config = software.amazon.msk.auth.iam.IAMLoginModule required;
target.sasl.client.callback.handler.class = software.amazon.msk.auth.iam.IAMClientCallbackHandler

# Replication config — IdentityReplicationPolicy preserves original topic names
replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy
source->target.enabled = true
source->target.topics = source\..*

# Consumer group mirroring
source->target.groups = .*
source->target.emit.checkpoints.enabled = true
source->target.sync.group.offsets.enabled = true

# Replication factors
replication.factor = 3
checkpoints.topic.replication.factor = 3
heartbeats.topic.replication.factor = 3
offset-syncs.topic.replication.factor = 3
offset.storage.replication.factor = 3
status.storage.replication.factor = 3
config.storage.replication.factor = 3

# Performance
tasks.max = 4
consumer.poll.timeout.ms = 1000
