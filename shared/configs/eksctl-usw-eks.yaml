apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: usw-eks
  region: us-west-2
  version: "1.33"
vpc:
  id: "vpc-079b609a902781180"
  subnets:
    private:
      us-west-2a:
        id: "subnet-0510c29b6390d030b"
      us-west-2b:
        id: "subnet-067e5a38b45c5f7b5"
managedNodeGroups:
  - name: ng-main
    instanceType: t4g.2xlarge
    desiredCapacity: 8
    minSize: 8
    maxSize: 8
    volumeSize: 100
    volumeType: gp3
    amiFamily: AmazonLinux2023
    iam:
      instanceRoleARN: "arn:aws:iam::061525506239:role/usw-eks-node-role"
addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-ebs-csi-driver
  - name: aws-efs-csi-driver
  - name: eks-pod-identity-agent
  - name: amazon-cloudwatch-observability
  - name: aws-load-balancer-controller
    version: v3.1.0
  - name: karpenter
    version: v1.9.0
